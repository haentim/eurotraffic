name: Deploy standalone app to GitHub Pages

# Builds the Shinylive/Pyodide site from the committed per-city data (web/data/)
# and publishes it. The 660 MB source DB is NOT in the repo, so this never runs the
# preprocessing pipeline — it only bundles the app and copies web/data into site/data.

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install shinylive
        run: pip install shinylive
      - name: Build site
        run: PYTHON=python SHINYLIVE=shinylive scripts/build_web.sh
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
